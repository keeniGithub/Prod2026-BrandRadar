services:
  frontend:
    image: "${DOCKER_IMAGE}"
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - web
    environment:
      - NODE_ENV=production
      - PORT=80
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API=${NEXT_PUBLIC_API}
      - NEXT_PUBLIC_ML=${NEXT_PUBLIC_ML}
      - NEXT_PUBLIC_PROJECT_ID=${NEXT_PUBLIC_PROJECT_ID}

networks:
  web:
    external: true